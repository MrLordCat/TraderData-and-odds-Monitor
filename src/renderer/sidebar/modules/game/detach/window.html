<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Game</title>
  <link rel="stylesheet" href="window.css">
</head>
<body>
  <div class="game-window">
    <!-- Header with scores -->
    <header class="game-header">
      <div class="score-group">
        <span class="score-label">Score</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div class="score-group">
        <span class="score-label">Best</span>
        <span class="score-value best" id="high-score">0</span>
      </div>
    </header>

    <!-- Canvas container -->
    <main class="canvas-container">
      <canvas id="game-canvas"></canvas>
      
      <!-- Overlay for messages -->
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <div class="overlay-icon" id="overlay-icon">🎮</div>
          <div class="overlay-title" id="overlay-title">Ready</div>
          <div class="overlay-subtitle" id="overlay-subtitle">Waiting for game...</div>
        </div>
      </div>
    </main>

    <!-- Controls -->
    <footer class="game-controls">
      <button id="btn-start" class="btn btn-primary" title="Start (Enter)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span>Start</span>
      </button>
      <button id="btn-pause" class="btn" disabled title="Pause (Space)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <span>Pause</span>
      </button>
      <button id="btn-reset" class="btn" title="Reset (R)">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <div class="spacer"></div>
      <button id="btn-attach" class="btn btn-icon" title="Attach back to sidebar">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
      </button>
    </footer>
  </div>

  <script src="window.js"></script>
</body>
</html>
